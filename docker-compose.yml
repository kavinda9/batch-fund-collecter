version: "3.9"

services:
  backend:
    build:
      context: ./backend

    container_name: batch-fund-backend

    ports:
      - "5001:5001"

    volumes:
      - ./backend:/app
      - /app/node_modules

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: batch-fund-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - VITE_API_URL=http://backend:5001

    depends_on:
      - backend

    restart: unless-stopped
